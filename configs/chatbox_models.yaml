models:
  gemma:
    model_name: gemma-4-31b
    base_url: http://duncanidaho:8080/v1
    api_key_env: STUB_API_KEY
    concurrency: 3
    max_tokens: 16384
    timeout: 300000
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

  qwen:
    model_name: qwen3.6-27b
    base_url: http://gurneyhalleck:8080/v1
    api_key_env: STUB_API_KEY
    concurrency: 3
    max_tokens: 16384
    temperature: 1.0
    top_p: 0.95
    presence_penalty: 1.5
    timeout: 300000
    extra_body:
      top_k: 20

  minimax:
    model_name: MiniMax-M3
    base_url: https://api.minimax.io/v1
    api_key_env: MINIMAX_API_KEY
    concurrency: 2
    max_tokens: 16384
    extra_body: {}
